name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kiselevos/tax-ci:v1.6.0
    env:
      GOFLAGS: "-buildvcs=false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Generate gRPC code
        run: make codegen

      - name: Ensure tidy modules
        run: make tidy

      - name: Debug diff after tidy
        run: git diff go.mod go.sum || true

      - name: Run backend CI checks
        run: make ci-backend
        continue-on-error: false

      - name: Upload backend binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tax-backend
          path: bin/tax

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    container:
      image: ghcr.io/kiselevos/tax-ci:v1.6.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('web/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Run frontend CI
        run: make ci-frontend
        continue-on-error: false

      - name: Upload frontend build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tax-frontend
          path: web/dist