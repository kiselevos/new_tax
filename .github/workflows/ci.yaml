name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kiselevos/tax-ci:v1.3.0

    env:
      GOFLAGS: "-buildvcs=false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Backend checks ---
      - name: Generate protobuf files
        run: make codegen

      - name: Lint backend
        run: make lint-all

      - name: Check formatting
        run: make check-fmt

      - name: Build backend
        run: make build

      - name: Run tests
        run: make test-all

      # --- Frontend checks ---
      - name: Type check frontend
        working-directory: ./web
        run: npm run type-check --if-present

      - name: Lint frontend
        working-directory: ./web
        run: npm run lint --if-present

      - name: Build frontend
        working-directory: ./web
        run: npm run build --if-present