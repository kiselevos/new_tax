name: Go CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    container:
        image: ghcr.io/kiselevos/tax-ci:v1.0.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate protobuf files
        run: make codegen

      - name: Check tidy
        run: make tidy

      - name: Lint
        run: make lint-all

      - name: Check formatting
        run: make check-fmt

      - name: Build project
        run: make build

      - name: Run tests
        run: make test-all

      - name: Check generated files committed
        run: make check-generated