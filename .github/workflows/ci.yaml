name: CI
on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop, main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      GOFLAGS: "-buildvcs=false"   # Глобально для всех make-команд (отключить VCS stamping)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: gomod-${{ hashFiles('**/go.sum') }}
      
      - uses: actions/cache@v4
        with:
          path: .tools/bin
          key: tools-${{ hashFiles('Makefile') }}
      
      - run: make setup-lint-tools
      - run: echo "$(pwd)/.tools/bin" >> $GITHUB_PATH

      - name: Verify backend dependencies
        run: make setup-backend
      
      - name: Lint backend
        run: make lint-all
      
      - name: Check formatting
        run: make check-fmt

      - name: Build backend
        run: make build

      - name: Run backend tests
        run: make test-all

      - name: Verify dependencies
        working-directory: web
        run: make setup-frontend

      - name: Lint frontend
        working-directory: web
        run: make lint
          
      - name: Run frontend tests
        working-directory: web
        run: make test
      
      - name: Build frontend
        working-directory: web
        run: make build