name: Go CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/yourname/go-proto-ci:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate protobuf files
        run: make proto

      - name: Build project
        run: make build

      - name: Run tests
        run: make test
