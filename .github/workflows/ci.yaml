name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  backend:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kiselevos/tax-ci:v1.4.0
    steps:
      - uses: actions/checkout@v4
      - run: make codegen
      - run: make ci-backend

  frontend:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kiselevos/tax-ci:v1.4.0
    steps:
      - uses: actions/checkout@v4
      - run: make ci-frontend