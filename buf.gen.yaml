version: v1
plugins:
  # --- Go (backend)
  - plugin: buf.build/protocolbuffers/go:v1.34.2
    out: gen/grpc
    opt: paths=source_relative

  - plugin: buf.build/connectrpc/go:v1.16.0
    out: gen/grpc
    opt: paths=source_relative

  # --- Frontend (TypeScript / React)
  - plugin: buf.build/bufbuild/es:v1.10.0
    out: web/src/gen
    opt: target=ts,import_extension=none

  - plugin: buf.build/connectrpc/es:v1.5.0
    out: web/src/gen
    opt: target=ts,import_extension=none