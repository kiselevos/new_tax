syntax = "proto3";

package tax;

option go_package = "github.com/kiselevos/new_tax/gen/grpc/api;api";

import "google/protobuf/timestamp.proto";

// Запрос от гостя
message CalculatePublicRequest {
  uint64 gross_salary = 1; // Оклад указанный в договоре
  optional uint64 territorial_multiplier = 2; // Территориальный коэффициент
  optional uint64 northern_coefficient = 3; // Северная надбавка
}

// Запрос зарегистрированного
message CalculatePrivateRequest {
  uint64 gross_salary = 1; // Оклад указанный в договоре
  optional uint64 territorial_multiplier = 2; // Территориальный коэффициент
  optional uint64 northern_coefficient = 3; // Северная надбавка
  optional google.protobuf.Timestamp start_date = 4; // Дата начала расчета
  optional bool has_tax_privilege = 5; // Льготы для силовых структур
  optional bool is_not_resident = 6; // Статус налогового нерезидента
  repeated uint64 monthly_bonuses = 7; // Разовые выплаты по месяцам (копейки), индекс 0 = январь

  // Параметры налоговых вычетов (опционально)
  optional uint32 children_count          = 8;  // Количество детей до 18 лет (ст. 218 НК РФ)
  optional uint32 disabled_children_count = 9;  // Количество детей-инвалидов (+12 000 ₽/мес на каждого, ст. 218 НК РФ)
  optional uint64 housing_expense   = 10; // Расходы на покупку жилья, копейки (ст. 220 НК РФ)
  optional uint64 mortgage_expense  = 11; // Уплаченные проценты по ипотеке, копейки (ст. 220 НК РФ)
  optional uint64 social_expense    = 12; // Расходы на лечение и своё обучение, копейки (ст. 219 НК РФ)
  optional uint64 child_edu_expense = 13; // Расходы на обучение ребёнка, копейки (ст. 219 НК РФ)
}

// Ответ для гостей (усечённый)
message CalculatePublicResponse {
  repeated MonthlyPublicTax monthly_details = 1; // Помесячная детализация

  uint64 annual_tax_amount = 2; // Уплаченный налог с начала выбранного периода 
  uint64 annual_gross_income = 3; // Гросс доход с начала указанного периода 
  uint64 annual_net_income = 4; // Чистый доход с начала указанного периода 

  uint64 gross_salary = 5; // Указаный оклад в запросе
  optional uint64 territorial_multiplier = 6; // Указаный в запросе территориальный коэффициент
  optional uint64 northern_coefficient = 7; // Указанная в запросе северная надбавка
}

// Результат расчёта налоговых вычетов
message DeductionResult {
  uint64 children_monthly_deduction = 1; // Ежемесячная сумма вычета на детей, копейки
  uint32 children_months            = 2; // Количество месяцев, за которые применён детский вычет
  uint64 children_return            = 3; // Возврат налога по детскому вычету, копейки

  uint64 property_return_this_year  = 4; // Возврат за жильё/ипотеку в расчётном периоде, копейки
  uint64 property_return_total      = 5; // Полная сумма возврата за жильё/ипотеку (часть переносится на след. годы)

  uint64 social_return              = 6; // Возврат по социальному вычету, копейки

  uint64 total_return               = 7; // Итого к возврату в расчётном периоде, копейки
}

// Ответ для авторизованных пользователей (подробный)
message CalculatePrivateResponse {
  repeated MonthlyPrivateTax monthly_details = 1; // Помесячная детализация

  uint64 annual_tax_amount = 2; // Уплаченный налог с начала выбранного периода
  uint64 annual_gross_income = 3; // Гросс доход с начала указанного периода
  uint64 annual_net_income = 4; // Чистый доход с начала указанного периода

  uint64 gross_salary = 5; // Указаный оклад в запросе
  optional uint64 territorial_multiplier = 6; // Указаный в запросе территориальный коэффициент
  optional uint64 northern_coefficient = 7; // Указанная в запросе северная надбавка

  uint64 annualPFR = 20; // Налог с начала выбранного периода работодателя в Пенсионный фонд России
  uint64 annualFOMS = 21; //Налог с начала выбранного периода работодателя в Фонд Обязательного медиционского страхования
  uint64 annualFSS = 22; //Налог с начала выбранного периода работодателя в Фонд социального страхования (Больничные, декреты)

  optional DeductionResult deduction_result = 24; // Результат расчёта налоговых вычетов (если переданы параметры)
}

// Полный расчёт на месяц для авторизованного пользователя
message MonthlyPrivateTax {
  google.protobuf.Timestamp month = 1; // Месяц
  uint64 monthly_gross_income = 2; // Гросс доход за месяц
  uint64 monthly_net_income = 3; // Чистый доход за месяц
  uint64 annual_gross_income = 4; // Гросс доход с начала указанного периода
  uint64 annual_net_income = 5; // Чистый доход за год с начала указанного периода
  uint64 tax_rate = 6; // Процент налога на данный момент
  uint64 monthly_tax_amount = 7; // Уплаченный налог в этом месяце
  uint64 annual_tax_amount = 8; // Уплаченный налог с начала года

  uint64 monthly_north_gross_income = 9; // Гросс доход северной надбавки
  uint64 monthly_base_gross_income = 10; // Гросс доход оклад + территориальный коэффициент

  uint64 monthly_north_tax_amount = 11; // Месячный налог с северной надбавки
  uint64 monthly_base_tax_amount = 12; // Месячный налог с оклада + территориального коэффициента

  uint64 annual_north_gross_income = 13; // Доход с начала года северной надбавки
  uint64 annual_base_gross_income = 14; // Доход с начала года оклад + территориальный коэффициент

  uint64 annual_north_tax_amount = 15; // Налог с начала года с северной надбавки
  uint64 annual_base_tax_amount = 16; // Налог с начала года с оклада + территориального коэффициента

  uint64 monthlyPFR = 17; //Месячный налог с работодателя в Пенсионный фонд России
  uint64 monthlyFOMS = 18; //Месячный налог с работодателя в Фонд Обязательного медиционского страхования
  uint64 monthlyFSS = 19; //Месячный налог с работодателя в Фонд социального страхования (Больничные, декреты)

  uint64 annualPFR = 20; // Налог с начала выбранного периода работодателя в Пенсионный фонд России
  uint64 annualFOMS = 21; //Налог с начала выбранного периода работодателя в Фонд Обязательного медиционского страхования
  uint64 annualFSS = 22; //Налог с начала выбранного периода работодателя в Фонд социального страхования (Больничные, декреты)

  uint64 monthly_bonus = 23; // Разовая выплата (премия) в этом месяце (копейки)
}

// Упрощённый расчёт на месяц для гостей
message MonthlyPublicTax {
  google.protobuf.Timestamp month = 1; // Месяц
  uint64 monthly_gross_income = 2; // Гросс доход за месяц
  uint64 monthly_net_income = 3; // Чистый доход за месяц
  uint64 monthly_tax_amount = 4; // Уплаченный налог в этом месяце
  uint64 annual_gross_income = 5; // Гросс доход с начала указанного периода
  uint64 annual_net_income = 6; // Чистый доход за год с начала указанного периода
  uint64 annual_tax_amount = 7; // Уплаченный налог с начала года
}

message HealthzRequest {}

message HealthzResponse {
  string status = 1;
}

// gRPC сервис с двумя методами
service TaxService {
  rpc CalculatePrivate (CalculatePrivateRequest) returns (CalculatePrivateResponse);
  rpc CalculatePublic  (CalculatePublicRequest) returns (CalculatePublicResponse);
  rpc Healthz (HealthzRequest) returns (HealthzResponse);
}
