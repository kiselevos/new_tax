services:
  backend:
    container_name: tax-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
      - "8081:8081"
    networks:
      - taxnet

  frontend:
    container_name: tax-frontend
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - taxnet

networks:
  taxnet:
    driver: bridge