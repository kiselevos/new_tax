services:
  redis:
    image: redis:7-alpine
    container_name: tax-redis
    ports:
      - "6379:6379"
    networks:
      - taxnet
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 2s
      timeout: 1s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tax-backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-50051}:50051"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - taxnet

  web:
    build:
      context: .
      dockerfile: ./web/Dockerfile
    container_name: tax-web
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      - BACKEND_ADDR=backend:50051
    depends_on:
      - backend
    networks:
      - taxnet

networks:
  taxnet:
    driver: bridge
