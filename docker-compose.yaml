services:
  backend:
    container_name: tax-backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - PORT=${BACKEND_PORT}
    networks:
      - taxnet
    healthcheck:
      test: timeout 5 bash -c 'echo > /dev/tcp/localhost/50051'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    container_name: tax-frontend
    build:
      context: ./web
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
      
    networks:
      - taxnet

networks:
  taxnet:
    driver: bridge
